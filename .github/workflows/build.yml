name: Build Padavan-NG WR841N-V14

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }

    steps:
      - uses: actions/checkout@v4

      - name: Download sources and toolchain
        run: |
          git config --global --add safe.directory '*'
          git clone -b main https://gitlab.com/hadzhioglu/padavan-ng
          wget -qO- "https://gitlab.com/hadzhioglu/padavan-ng/-/package_files/$(
            curl -s 'https://gitlab.com/api/v4/projects/hadzhioglu%2Fpadavan-ng/packages?package_name=toolchain&per_page=1' \
            | python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['id'])"
          )/download" | tar -C padavan-ng --zstd -xf - || \
          wget -qO- "$(grep PADAVAN_TOOLCHAIN_URL variables | cut -d= -f2- | tr -d \"')" \
            | tar -C padavan-ng --zstd -xf -

      - name: Build firmware
        run: |
          cp build.config padavan-ng/trunk/.config
          cd padavan-ng/trunk
          ./clear_tree.sh
          ./build_firmware.sh
          FW_FILE_NAME="$(find images -type f -regextype posix-extended \
            -iregex ".*\.(trx|bin)$" -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
          echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Padavan_WR841N_V14
          path: padavan-ng/trunk/images/${{ env.FW_FILE_NAME }}
          retention-days: 30
